name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: clipboard-manager

jobs:
  build-macos:
    name: Build macOS binary
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp target/release/${BINARY_NAME} dist/${BINARY_NAME}
          chmod +x dist/${BINARY_NAME}

          ARCHIVE_NAME="${BINARY_NAME}-${GITHUB_REF_NAME}-macos"
          tar -C dist -czf "dist/${ARCHIVE_NAME}.tar.gz" "${BINARY_NAME}"
          shasum -a 256 "dist/${ARCHIVE_NAME}.tar.gz" > "dist/${ARCHIVE_NAME}.tar.gz.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*.tar.gz
            dist/*.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
